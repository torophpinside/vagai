name: E2E Tests
on: [push, pull_request]
jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: vagai-api/go.sum
      - name: Run E2E tests
        run: go test -v -count=1 -timeout 10m ./internal/tests/e2e/
        working-directory: vagai-api
